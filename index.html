<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name | Link in bio</title>
  <meta name="description" content="リンク集ページ" />
  <!-- OGP（SNSシェア用） -->
  <meta property="og:title" content="Your Name" />
  <meta property="og:description" content="ここに一言紹介が入ります。" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/avatar.svg" />
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1a1a1a;        /* カード内の文字色（カードは白なので濃色固定） */
      --page-text: #1a1a1a;   /* 名前・一言・フッターの文字色（背景に応じて変更） */
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 6px 16px rgba(0, 0, 0, 0.08);
      --accent: #6d5efc;        /* アクセントカラー（テーマで変更） */
      --radius: 14px;           /* ボタンの角丸（テーマで変更） */
      --avatar-radius: 50%;     /* アイコンの形（テーマで変更） */
      --font: system-ui, -apple-system, "Hiragino Kaku Gothic ProN",
        "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    }
    /* フォントの選択肢（theme.font で指定） */
    [data-font="rounded"] {
      --font: "Hiragino Maru Gothic ProN", "Quicksand", "Rounded Mplus 1c",
        system-ui, sans-serif;
    }
    [data-font="serif"] {
      --font: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", Georgia, serif;
    }
    [data-font="mono"] {
      --font: "SF Mono", "Menlo", "Consolas", "Courier New", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
    }
    /* 画像背景のときに文字を読みやすくする半透明レイヤー（任意） */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      display: none;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: var(--avatar-radius);
      object-fit: cover;
      border: 3px solid var(--card);
      box-shadow: var(--shadow-hover);
      background: #e9ebef;
    }
    .name {
      margin-top: 20px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
      color: var(--page-text);
    }
    .bio {
      margin-top: 8px;
      color: var(--page-text);
      opacity: 0.72;
      font-size: 0.95rem;
      text-align: center;
      max-width: 360px;
      white-space: pre-line; /* 改行（\n）をそのまま表示 */
    }
    .links {
      margin-top: 32px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease,
        background 0.15s ease;
    }
    .link:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }
    .link:active { transform: translateY(0); }
    .link svg { width: 22px; height: 22px; flex-shrink: 0; }
    .link span { flex: 1; }
    .link .chev { color: var(--muted); width: 16px; height: 16px; }

    /* ボタンスタイル（theme.buttonStyle で指定） */
    /* outline … 背景透明＋アクセント枠線 */
    [data-btn="outline"] .link {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--page-text);
      box-shadow: none;
    }
    [data-btn="outline"] .link .chev,
    [data-btn="outline"] .link svg { color: var(--page-text); }
    [data-btn="outline"] .link:hover { background: rgba(255, 255, 255, 0.12); }

    /* solid … アクセント色で塗りつぶし＋白文字 */
    [data-btn="solid"] .link {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
    [data-btn="solid"] .link .chev,
    [data-btn="solid"] .link svg { color: #ffffff; }
    [data-btn="solid"] .link:hover { filter: brightness(1.06); }

    /* glass … 半透明＋すりガラス（写真背景と相性良） */
    [data-btn="glass"] .link {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: var(--page-text);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      box-shadow: none;
    }
    [data-btn="glass"] .link .chev,
    [data-btn="glass"] .link svg { color: var(--page-text); }
    footer { margin-top: 40px; color: var(--page-text); opacity: 0.6; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <main class="container">
    <img class="avatar" id="avatar" alt="プロフィール画像" />
    <h1 class="name" id="name"></h1>
    <p class="bio" id="bio"></p>
    <nav class="links" id="links"></nav>
    <footer id="footer"></footer>
  </main>

  <!-- ============================================================ -->
  <!-- ▼▼▼ ここだけ編集すればOK（カスタマイズ設定） ▼▼▼            -->
  <!-- ============================================================ -->
  <script>
    const CONFIG = {
      // プロフィール
      name: "Ur Name",
      bio: "ここに一言紹介が入ります。あなたの活動やテーマを短く書きましょう。",
      avatar: "assets/avatar.svg", // 自分の画像URL or ファイルに差し替え（正方形推奨）

      // 背景：次のいずれかを指定
      //   色:        "#f7f8fa" や "white" など
      //   グラデ:    "linear-gradient(135deg, #a18cd1, #fbc2eb)"
      //   画像:      "assets/bg.jpg"（.jpg/.png/.webp/.gif/.svg は自動で画像背景に）
      background: "#f7f8fa",

      // 背景に合わせた文字色（名前・一言・フッター）。暗い背景なら "#ffffff" 推奨
      textColor: "#1a1a1a",

      // 画像背景のとき文字を読みやすくする重ね色（任意）。不要なら "" にする
      //   例（暗くする）: "rgba(0,0,0,0.35)"  /  例（明るくする）: "rgba(255,255,255,0.45)"
      overlay: "",

      // ▼ デザイン（自由に変えられる見た目の設定）
      theme: {
        accent: "#6d5efc",      // アクセントカラー（ホバー枠・solid塗り・glass縁取り）
        font: "sans",           // フォント： "sans" / "rounded" / "serif" / "mono"
        buttonStyle: "card",    // ボタン： "card"(白カード) / "outline"(枠線) / "solid"(塗り) / "glass"(すりガラス)
        buttonRadius: 14,       // ボタンの角丸(px)。0=四角 / 14=標準 / 999=カプセル型
        avatarShape: "circle",  // アイコンの形： "circle"(丸) / "rounded"(角丸) / "square"(四角)
      },

      // リンク一覧：不要な行は丸ごと削除、必要な行は複製して増やせます。
      //   icon … 下のアイコン一覧から選択（未対応の名前なら自動で汎用アイコン）
      //   label … ボタンに表示する文字
      //   url … リンク先（メールは "mailto:..." と書く）
      links: [
        { icon: "x",         label: "X (Twitter)", url: "https://x.com/yourname" },
        { icon: "instagram", label: "Instagram",   url: "https://instagram.com/yourname" },
        { icon: "youtube",   label: "YouTube",      url: "https://youtube.com/@yourname" },
        { icon: "tiktok",    label: "TikTok",       url: "https://tiktok.com/@yourname" },
        { icon: "email",     label: "メール",        url: "mailto:your@email.com" },
        // 例：他のリンクも追加できます ↓（不要なら消してOK）
        // { icon: "website",  label: "公式サイト", url: "https://example.com" },
        // { icon: "line",     label: "LINE",      url: "https://line.me/..." },
        // { icon: "github",   label: "GitHub",    url: "https://github.com/yourname" },
      ],

      footer: "Ur Name", // フッターの名前（© 年 はこの前に自動で付きます）
    };
  </script>
  <!-- ============================================================ -->
  <!-- ▲▲▲ 編集はここまで。以下は触らなくてOK ▲▲▲                  -->
  <!-- ============================================================ -->

  <script>
    // 使えるアイコン一覧（icon: の値で指定）。未対応の名前は "website" にフォールバック。
    const ICONS = {
      x: '<path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>',

      tiktok: '<path d="M16.6 5.82a4.28 4.28 0 01-1.06-2.82h-3.3v13.4a2.59 2.59 0 01-2.59 2.5 2.59 2.59 0 01-2.59-2.59 2.59 2.59 0 012.59-2.59c.27 0 .53.04.78.12V10.5a5.9 5.9 0 00-.78-.05A5.94 5.94 0 003.7 16.4a5.94 5.94 0 005.94 5.94 5.94 5.94 0 005.94-5.94V9.01a7.57 7.57 0 004.42 1.42V7.13a4.28 4.28 0 01-3.4-1.31z"/>',
      email: '<g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></g>',
      website: '<g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></g>',
      line: '<path d="M12 2C6.48 2 2 5.69 2 10.23c0 4.06 3.55 7.46 8.35 8.1.32.07.77.21.88.49.1.25.07.64.03.9l-.14.85c-.04.25-.2.98.86.53s5.7-3.36 7.78-5.75c1.43-1.57 2.24-3.17 2.24-5.12C22 5.69 17.52 2 12 2zM8.07 12.62H6.1a.52.52 0 0 1-.52-.52V8.18a.52.52 0 1 1 1.04 0v3.4h1.45a.52.52 0 1 1 0 1.04zm2.04-.52a.52.52 0 1 1-1.04 0V8.18a.52.52 0 1 1 1.04 0v3.92zm4.7 0a.52.52 0 0 1-.36.5.5.5 0 0 1-.16.02.52.52 0 0 1-.42-.21l-2.01-2.74v2.43a.52.52 0 1 1-1.04 0V8.18a.52.52 0 0 1 .93-.31l2.02 2.74V8.18a.52.52 0 1 1 1.04 0v3.92zm3.3-2.49a.52.52 0 1 1 0 1.04h-1.45v.93h1.45a.52.52 0 1 1 0 1.04h-1.97a.52.52 0 0 1-.52-.52V8.18a.52.52 0 0 1 .52-.52h1.97a.52.52 0 1 1 0 1.04h-1.45v.91h1.45z"/>',
      facebook: '<path d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07c0 6.02 4.39 11.01 10.13 11.93v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.69.24 2.69.24v2.97h-1.52c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.08 24 18.09 24 12.07z"/>',

    };

    function iconSvg(name) {
      const body = ICONS[name] || ICONS.website;
      const fill = body.startsWith("<g") ? 'fill="none"' : 'fill="currentColor"';
      return '<svg viewBox="0 0 24 24" ' + fill + ' aria-hidden="true">' + body + "</svg>";
    }

    const chev = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>';

    // 背景を適用（色 / グラデーション / 画像 を自動判定）
    function applyBackground(bg) {
      if (!bg) return;
      const isImage = /\.(png|jpe?g|webp|gif|avif|svg)(\?.*)?$/i.test(bg) || /^url\(/i.test(bg);
      if (isImage) {
        const url = /^url\(/i.test(bg) ? bg : "url('" + bg + "')";
        document.body.style.backgroundImage = url;
      } else {
        // 色・グラデーションはそのまま指定
        document.body.style.background = bg;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.backgroundAttachment = "fixed";
      }
    }

    // テーマ（デザイン）を適用
    function applyTheme(t) {
      t = t || {};
      const root = document.documentElement;
      if (t.accent) root.style.setProperty("--accent", t.accent);
      if (t.buttonRadius != null) root.style.setProperty("--radius", t.buttonRadius + "px");
      const shapes = { circle: "50%", rounded: "18px", square: "6px" };
      root.style.setProperty("--avatar-radius", shapes[t.avatarShape] || "50%");
      document.body.dataset.font = t.font || "sans";
      document.body.dataset.btn = t.buttonStyle || "card";
    }

    // 描画
    applyBackground(CONFIG.background);
    applyTheme(CONFIG.theme);
    if (CONFIG.textColor) {
      document.documentElement.style.setProperty("--page-text", CONFIG.textColor);
    }
    if (CONFIG.overlay) {
      const ov = document.getElementById("overlay");
      ov.style.background = CONFIG.overlay;
      ov.style.display = "block";
    }
    document.title = CONFIG.name + " | Link in bio";
    document.getElementById("avatar").src = CONFIG.avatar;
    document.getElementById("avatar").alt = CONFIG.name;
    document.getElementById("name").textContent = CONFIG.name;
    document.getElementById("bio").textContent = CONFIG.bio;
    document.getElementById("links").innerHTML = (CONFIG.links || [])
      .map(function (l) {
        const isMail = String(l.url).startsWith("mailto:");
        const attrs = isMail ? "" : ' target="_blank" rel="noopener"';
        return (
          '<a class="link" href="' + l.url + '"' + attrs + ">" +
          iconSvg(l.icon) +
          "<span>" + l.label + "</span>" +
          chev +
          "</a>"
        );
      })
      .join("");
    document.getElementById("footer").innerHTML =
      "© " + new Date().getFullYear() + " " + CONFIG.footer;
  </script>
</body>
</html>
